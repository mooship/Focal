included:
  - Focal
  - FocalTests

excluded:
  - FocalUITests

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - explicit_init

disabled_rules:
  - function_body_length
  - type_body_length
  - file_length

force_cast: error
force_try: error

line_length:
  warning: 130
  error: 200
  ignores_urls: true

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - i
    - id
