name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    env:
      SCHEME: Focal
      DESTINATION: platform=iOS Simulator,name=iPhone 16,OS=latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Initialize Xcode
        run: sudo xcodebuild -runFirstLaunch

      - name: Register iOS simulator runtime
        run: |
          RUNTIME="$(xcode-select -p)/Platforms/iPhoneOS.platform/Developer/Library/CoreSimulator/Profiles/Runtimes/iOS.simruntime"
          xcrun simctl runtime add "$RUNTIME"

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
import json, sys
data = json.load(sys.stdin)
for devices in data['devices'].values():
    for d in devices:
        if 'iPhone 16' in d['name'] and d['isAvailable']:
            print(d['udid'])
            exit()
")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('Focal.xcodeproj/project.pbxproj') }}-${{ hashFiles('Focal/**/*.swift', 'FocalTests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-${{ hashFiles('Focal.xcodeproj/project.pbxproj') }}-
            ${{ runner.os }}-deriveddata-

      - name: Build
        run: |
          xcodebuild build \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Test
        run: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
