name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26

    env:
      SCHEME: Focal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '~26'

      - name: Initialize Xcode
        run: sudo xcodebuild -runFirstLaunch

      - name: Boot simulator
        run: |
          UDID=$(python3 - <<'EOF'
import json, subprocess
data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "--json"]))
ios = sorted(k for k in data["devices"] if "iOS" in k)
for runtime in reversed(ios):
    for d in data["devices"][runtime]:
        if d["name"] == "iPhone 17" and d["isAvailable"]:
            print(d["udid"])
            exit()
EOF
)
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ env.MD_APPLE_SDK_ROOT }}-${{ hashFiles('Focal.xcodeproj/project.pbxproj') }}-${{ hashFiles('Focal/**/*.swift', 'FocalTests/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-${{ env.MD_APPLE_SDK_ROOT }}-${{ hashFiles('Focal.xcodeproj/project.pbxproj') }}-
            ${{ runner.os }}-deriveddata-${{ env.MD_APPLE_SDK_ROOT }}-

      - name: Test
        run: |
          xcodebuild test \
            -scheme "$SCHEME" \
            -destination "id=$SIM_UDID" \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
